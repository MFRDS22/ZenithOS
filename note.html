<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Blocco Note</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --sidebar-bg: #111827;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; opacity: 0; }

        /* SIDEBAR DELLO SPAZIO DI LAVORO */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); border-right: 1px solid #1f2937; padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; position: fixed; height: 100vh; }
        .sidebar h2 { font-size: 1.2rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; padding-left: 10px; }
        .sidebar a { color: var(--text-muted); text-decoration: none; padding: 12px 15px; border-radius: 8px; font-weight: 600; transition: all 0.3s; display: flex; align-items: center; gap: 10px; }
        .sidebar a:hover, .sidebar a.active { background-color: #1e293b; color: var(--text-main); }
        .sidebar a.active { border-left: 4px solid var(--accent); }

        /* CONTENUTO PRINCIPALE */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
        }

        header h1 { font-size: 2.2rem; }
        header p { color: var(--text-muted); margin-top: 5px; }

        .notebook-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #334155;
            max-width: 900px;
            width: 100%;
            transform: translateY(20px);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* AREA DI TESTO STILE BLOCK NOTE CORRETTO */
        textarea {
            width: 100%;
            height: 450px;
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.05rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-message {
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        button { padding: 12px 24px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.2s, background-color 0.3s; }
        button:hover { transform: scale(1.02); }
        .btn-save { background-color: var(--accent); color: #0b0f19; }
        .btn-clear { background-color: #ef4444; color: white; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>Workspace</h2>
        <a href="index.html">🏠 <span>Home</span></a>
        <a href="svago.html">🎮 <span>Area 1: Svago & Focus</span></a>
        <a href="note.html" class="active">📝 <span>Area 2: Blocco Note</span></a>
        <a href="utility.html">🌐 <span>Area 3: Siti Utili</span></a>
        <a href="musica.html">🎵 <span>Area 4: Media Player</span></a>
        <a href="food.html">🍕 <span>Area 5: Food Delivery</span></a>
    </nav>

    <main class="main-content">
        <header id="note-header">
            <h1>Blocco Note Persistente</h1>
            <p>Butta giù bozze, appunti di studio o idee di lavoro. Tutto rimane salvato all'istante.</p>
        </header>

        <div class="notebook-panel" id="note-panel">
            <textarea id="notepad" placeholder="Comincia a scrivere qui i tuoi appunti..."></textarea>
            
            <div class="action-bar">
                <div class="status-message" id="status">Tutti i cambiamenti sono salvati nel browser.</div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-clear" id="btn-clear">Cancella Tutto</button>
                    <button class="btn-save" id="btn-save">Copia Testo</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            gsap.to("body", { opacity: 1, duration: 0.3 });
            gsap.from("#note-header", { opacity: 0, y: -20, duration: 0.6 });
            gsap.to("#note-panel", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out", delay: 0.1 });
        });

        const notepad = document.getElementById('notepad');
        const statusMsg = document.getElementById('status');
        const btnClear = document.getElementById('btn-clear');
        const btnSave = document.getElementById('btn-save');

        // Carica il testo precedentemente salvato
        notepad.value = localStorage.getItem('workspace_notes') || '';

        // Salvataggio automatico ad ogni tasto premuto (Auto-save in tempo reale)
        notepad.addEventListener('input', () => {
            localStorage.setItem('workspace_notes', notepad.value);
            statusMsg.textContent = "Salvataggio automatico...";
            statusMsg.style.color = "var(--text-muted)";
            
            // Rimetti il messaggio di conferma dopo un secondo di inattività
            clearTimeout(notepad.timeout);
            notepad.timeout = setTimeout(() => {
                statusMsg.textContent = "Modifiche salvate in locale.";
                statusMsg.style.color = "var(--success)";
            }, 1000);
        });

        // Pulsante Copia Testo negli appunti
        btnSave.addEventListener('click', () => {
            notepad.select();
            navigator.clipboard.writeText(notepad.value);
            statusMsg.textContent = "Testo copiato negli appunti con successo!";
            statusMsg.style.color = "var(--accent)";
        });

        // Pulsante Cancella Tutto con conferma di sicurezza
        btnClear.addEventListener('click', () => {
            if(confirm("Sei sicuro di voler cancellare definitivamente tutte le note scritte?")) {
                notepad.value = '';
                localStorage.removeItem('workspace_notes');
                statusMsg.textContent = "Tutto cancellato.";
                statusMsg.style.color = "#ef4444";
            }
        });
    </script>
</body>
</html>
